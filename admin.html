<!DOCTYPE html><html lang=en><head>
<meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,maximum-scale=1'>
<title>helm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#00ff41;font:13px/1.3 monospace}
#tb{position:fixed;top:0;left:0;right:0;z-index:9;background:#000;border-bottom:1px solid #222;display:flex;overflow-x:auto}
#tb button{padding:10px 14px;border:none;background:none;color:#555;font:12px monospace;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
#tb button.on{color:#00ff41;border-bottom-color:#00ff41}
#main{margin-top:42px;padding:8px}
.panel{display:none}
.panel.on{display:block}
.term{background:#000;color:#0f0;padding:10px;min-height:300px;max-height:60vh;overflow-y:auto;white-space:pre-wrap;border:1px solid #222;font:12px monospace}
input{width:100%;background:#111;border:1px solid #333;color:#fff;padding:8px;font:inherit;margin:3px 0}
button{background:#111;border:1px solid #00ff41;color:#00ff41;padding:7px 14px;font:inherit;cursor:pointer;margin:2px}
button:active{background:#00ff41;color:#000}
.card{background:#111;border:1px solid #222;padding:10px;margin:4px 0}
.card h4{font-size:11px;color:#888;margin:0 0 6px 0}
pre{font:10px/1.3 monospace;white-space:pre-wrap;max-height:140px;overflow-y:auto}
.btnr{display:flex;gap:4px}
</style></head><body>
<div id=tb>
  <button onclick=S('t') class=on>>_</button>
  <button onclick=S('a')>🤖</button>
  <button onclick=S('s')>💻</button>
  <button onclick=S('p')>🌐</button>
</div>
<div id=main>

<div id=t class='panel on'>
  <div class=term id=to>$ helm terminal — type command, press Enter</div>
  <div class=btnr><span style=color:#0f0;padding:6px>$</span><input id=ti placeholder='ls /opt' onkeydown='if(event.key=="Enter")run()' autofocus></div>
</div>

<div id=a class=panel>
  <div id=agentList class=term style=min-height:60px>loading agents...</div>
  <div class=btnr><input id=bm placeholder='broadcast message'><button onclick=bcast() style=background:#030>BCAST ALL</button></div>
</div>

<div id=s class=panel>
  <div class=card><h4>DISK</h4><pre id=sd></pre></div>
  <div class=card><h4>MEM</h4><pre id=sm></pre></div>
  <button onclick=rs() style=width:100%>REFRESH</button>
</div>

<div id=p class=panel>
  <pre id=po class=term style=min-height:120px>loading...</pre>
  <div class=btnr><input id=pid2 placeholder='node id'><input id=pm2 placeholder='message'><button onclick=sp2()>SEND</button></div>
  <button onclick=rp() style=width:100%>REFRESH</button>
</div>

</div>
<script>
function S(id){document.querySelectorAll('.panel,#tb button').forEach(e=>e.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelector('#tb button[onclick*="'+id+'"]')?.classList.add('on')}
async function api(url,b){try{const r=await fetch(url,b?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}:{});return r.ok?r.json():{error:await r.text()}}catch(e){return{error:e.message}}}

async function run(){const c=document.getElementById('ti').value;if(!c)return;const o=document.getElementById('to');o.textContent+='\n$ '+c;const r=await api('/api/shell',{cmd:c});o.textContent+='\n'+(r.output||JSON.stringify(r));document.getElementById('ti').value='';o.scrollTop=o.scrollHeight}

// Dynamic agents from directory
async function loadAgents(){
  const el=document.getElementById('agentList');
  const r=await api('/api/shell',{cmd:'curl -sm3 http://127.0.0.1:8090/api/users 2>/dev/null'});
  try{
    const peers=JSON.parse(r.output||'[]');
    if(!peers.length){el.textContent='no peers online';return}
    el.innerHTML='';
    for(const p of peers){
      const c=document.createElement('div');c.className='card';
      c.innerHTML='<h4>'+p.username+' ('+p.node_id+') '+(p.online?'🟢':'🔴')+'</h4><div class=btnr><input id=msg_'+p.node_id+' placeholder=msg><button onclick=send(\"'+p.node_id+'\",\"msg_'+p.node_id+'\")>SEND</button></div>';
      el.appendChild(c);
    }
  }catch(e){el.textContent='parse error: '+e.message}
}

async function send(pid,mid){const el=document.getElementById(mid);if(!el)return;const m=el.value;if(!m)return;const r=await api('/api/agent-send',{peerId:pid,message:m});alert(r.sent?'Sent to '+pid:'Error');el.value=''}

async function bcast(){const m=document.getElementById('bm').value;if(!m)return;const r=await api('/api/shell',{cmd:'curl -sm3 http://127.0.0.1:8090/api/users 2>/dev/null'});try{const peers=JSON.parse(r.output||'[]');let ok=0;for(const p of peers){if(!p.online)continue;await api('/api/agent-send',{peerId:p.node_id,message:m});ok++}alert('Sent to '+ok+' peers')}catch(e){alert('error: '+e.message)}}

async function rs(){const d=await api('/api/system');document.getElementById('sd').textContent=d.disk||'?';document.getElementById('sm').textContent=d.mem||'?'}
async function rp(){const r=await api('/api/shell',{cmd:'curl -sm3 http://127.0.0.1:8090/api/users 2>/dev/null || echo offline'});document.getElementById('po').textContent=r.output||'?'}
async function sp2(){const i=document.getElementById('pid2').value;const m=document.getElementById('pm2').value;const r=await api('/api/agent-send',{peerId:i,message:m});alert(r.sent?'Sent':'Error')}

loadAgents();rs();rp();setInterval(rs,45000);setInterval(rp,30000);setInterval(loadAgents,60000)
</script></body></html>
