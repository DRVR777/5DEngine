<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="data:,">
<title>5DEngine — Ankhor substrate</title>
<style>
html,body{margin:0;height:100%;background:#0b0d12;color:#cfc;font:13px/1.4 monospace;overflow:hidden}
#stage{position:fixed;inset:0;display:block;touch-action:none}
@keyframes floatUp{from{opacity:1;transform:translate(-50%,-50%)}to{opacity:0;transform:translate(-50%,-150%)}}
@keyframes particleBurst{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(0)}}
#boot{position:fixed;top:8px;left:8px;opacity:.72;pointer-events:none;z-index:10}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="boot">ankhor • boot</div>
<a id="modeSwitch" href="./game.html" style="position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(20,24,40,0.85);border:1px solid #fa8;border-radius:6px;padding:5px 12px;color:#fc9;font:12px monospace;text-decoration:none;">⇆ legacy game</a>

<!-- HUD -->
<div id="hud" style="position:fixed;inset:0;pointer-events:none;z-index:100;font:16px monospace;color:#fff;">
  <div id="hp" style="position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.6);padding:8px 14px;border-radius:4px;">HP 100</div>
  <div id="ammo" style="position:absolute;bottom:20px;right:20px;background:rgba(0,0,0,0.6);padding:8px 14px;border-radius:4px;">60 / 60</div>
  <div id="kills" style="position:absolute;top:30px;right:20px;color:#ff0;font:14px monospace;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:3px;">0 kills</div>
  <div id="weapon" style="position:absolute;bottom:60px;left:20px;color:#aaa;font:12px monospace;background:rgba(0,0,0,0.4);padding:4px 8px;border-radius:3px;">PISTOL</div>
  <div id="sprint" style="position:absolute;bottom:100px;left:20px;color:#0ff;font:12px monospace;background:rgba(0,0,0,0.4);padding:4px 8px;border-radius:3px;opacity:0;">SPRINT</div>
  <div id="crosshair" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;">
    <div style="position:absolute;top:0;left:50%;width:2px;height:8px;background:#0f0;opacity:0.8;margin-left:-1px;"></div>
    <div style="position:absolute;bottom:0;left:50%;width:2px;height:8px;background:#0f0;opacity:0.8;margin-left:-1px;"></div>
    <div style="position:absolute;left:0;top:50%;width:8px;height:2px;background:#0f0;opacity:0.8;margin-top:-1px;"></div>
    <div style="position:absolute;right:0;top:50%;width:8px;height:2px;background:#0f0;opacity:0.8;margin-top:-1px;"></div>
  </div>
  <div id="muzzle" style="position:absolute;top:50%;left:50%;width:60px;height:60px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,200,50,0.3),transparent);opacity:0;transition:opacity 50ms;"></div>
  <div id="reload" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff0;font:bold 18px monospace;opacity:0;">RELOADING...</div>
  <div id="minimap" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:100px;height:100px;border:2px solid rgba(255,255,255,0.25);border-radius:8px;background:rgba(0,0,0,0.6);">
    <canvas id="mm" width="100" height="100"></canvas>
  </div>
</div>

<!-- Atmosphere -->
<div id="bloom" style="position:fixed;inset:0;pointer-events:none;z-index:49;background:radial-gradient(ellipse at center,rgba(255,255,200,0.03),transparent 70%);mix-blend-mode:screen;"></div>
<div id="fogOverlay" style="position:fixed;inset:0;pointer-events:none;z-index:50;background:radial-gradient(circle,rgba(200,220,255,0.08),rgba(100,150,200,0.15));mix-blend-mode:screen;"></div>

<div id="philo" style="position:fixed;bottom:8px;left:8px;opacity:.4;pointer-events:none;z-index:10;font-size:11px">subtraction. one type. one tick. <a href="./game.html" style="color:#9cf">→ game.html</a></div>

<script type="importmap">
{ "imports": { "three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js", "registry":"./experimental/holograph-runtime/src/registry.js", "boot":"./src/ankhor/boot.js", "hud":"./src/ankhor/hud.js" } }
</script>
<script type="module">
import { boot } from "boot";
import { initHUD } from "hud";

const bootEl = document.getElementById("boot");
function setBoot(html) { bootEl.innerHTML = html; }
setBoot("ankhor • booting…");

try {
  const ankhor = await boot({ canvas: document.getElementById("stage"),
    onReady({ stats }) {
      setBoot(`ankhor • ${stats?.materialized??'?'} live · ${stats?.kindDefs??'?'} kinds · ${stats?.handlers??'?'} facets · <a href="./game.html">→ game.html</a>`);
    }
  });
  window.Ankhor = ankhor;

  // Keyboard
  const keys = {}; let yaw=0,pitch=0,mouseHeld=false;
  addEventListener('keydown',e=>keys[e.code]=true);
  addEventListener('keyup',e=>keys[e.code]=false);
  const canvas=document.getElementById('stage');
  canvas.addEventListener('click',()=>canvas.requestPointerLock());
  addEventListener('mousemove',e=>{if(document.pointerLockElement===canvas){yaw-=e.movementX*0.0035;pitch=Math.max(-1.4,Math.min(0.4,pitch-e.movementY*0.0035))}});
  addEventListener('mousedown',e=>{if(e.button===0){mouseHeld=true;document.getElementById('muzzle').style.opacity='1';document.getElementById('crosshair').style.filter='brightness(2)';setTimeout(()=>{document.getElementById('muzzle').style.opacity='0';document.getElementById('crosshair').style.filter=''},80)}});
  addEventListener('mouseup',e=>{if(e.button===0)mouseHeld=false});

  // HUD module
  const hud = initHUD(ankhor);

  // Tick wrapper
  const realTick = ankhor.tick.bind(ankhor);
  ankhor.tick = function(dt) {
    const inputs = ankhor.byKind("input");
    if (inputs.length) { const fd=ankhor.facetData(inputs[0].id,"input-state"); if(fd){fd.keys={...keys};fd.yaw=yaw;fd.pitch=pitch;fd.mouseHeld=mouseHeld;} }
    const r = realTick(dt);
    try { hud.tick(dt); } catch(e) {}
    return r;
  };
} catch(e) {
  console.error("[boot] FATAL:", e);
  setBoot(`<span style="color:#ff6666">ankhor boot FAILED:</span> ${e?.message||e} · <a href="./game.html">→ game.html</a>`);
}
</script>
</body>
</html>
