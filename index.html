  5DEngine — main module entry point
  ════════════════════════════════════════════════════════════════════════════

  ARCHITECTURE OVERVIEW
  ─────────────────────
  This file is the game's single entry point. All state lives here as `let`
  variables; systems receive it through closure-based dependency injection:

    mountXxx({ get: { foo: () => foo }, set: { foo: v => { foo = v; } }, actions })

  "get/set" pairs expose individual state fields without passing mutable refs.
  "actions" provides callbacks to engine functions the module needs to call.

  All extracted modules live in src/ and are re-exported from engine_modules.js.
  index.html imports only from that one barrel file.

  TICK FUNCTION ORDER (tick(), called via requestAnimationFrame)
  ──────────────────────────────────────────────────────────────
  1. Time: dt capped at 50ms; bullet-time scalar applied; Engine.time.tick
  2. HUD pre-tick: FPS counter, ammo/reload display, auto-fire
  3. Input: scope FOV, crosshair, sniper sway
  4. Camera: snap-zoom, computer entry dolly
  5. Computer-open early-exit: render + rAF, no gameplay
  6. Movement: freecam, hero WASD, vehicle physics, jump/gravity
  7. Footsteps, stamina, speed boost, motion springs
  8. Bullet physics: travel, enemy hit detection, kill processing
  9. Enemy AI loop: knockback, BT, vision, ranged attacks, movement
  10. NPC movement, enemy separation, enemy regen
  11. Pickups, hazards, grenade physics
  12. Optional systems: TriggerZones, SoundZones, Cutscene, Achievements,
      DayNight, StatusEffects, WaveManager
  13. Render: camera position, scene render, post-processing
  14. HUD post-tick: health bars, wave HUD, kill feed, overlay tints
  15. requestAnimationFrame(tick) — schedule next frame

  STATE VARIABLE CONVENTIONS
  ──────────────────────────
  _xxx     — private to this module (not exposed on window)

// ---- device graph (devices.js + wires.js) ----------------------------
// Build a small in-world hardware setup adjacent to the computer pickup:
// PC ── video → Monitor (placed on top of the desk)
// PC ── audio → Speaker (placed to the right)
// PC ── data  ← USB stick (sitting in usb_a)
// Two radios: one at the desk, one across the map at the same frequency
// (so a packet sent from one literally appears in the other's inbox).
const deviceBus = (window.Devices && window.Devices.createBus)
  ? window.Devices.createBus()
  : null;
const wireMeshes = new Map();   // wireId → THREE.Mesh
const devicePositions = new Map();  // deviceId → THREE.Vector3 (for refresh)

function _rebuildDeviceWires() {
  if (!deviceBus || !window.Wires) return;
  // Tear down old meshes
  for (const m of wireMeshes.values()) scene.remove(m);
  wireMeshes.clear();
  const map = window.Wires.buildAllWireMeshes(THREE, deviceBus,
    (id) => {
      const v = devicePositions.get(id);
      return v ? { x: v.x, y: v.y, z: v.z } : null;
    });
  for (const [wireId, mesh] of map) {
    scene.add(mesh);
    wireMeshes.set(wireId, mesh);
  }
}

    const d = _devs[key] || {};
    if (d.u !== undefined) return { u: d.u, v: d.v, y: d.dy !== undefined ? d.dy : fallbackDy };
    return {
      u: computerEntity.u + (d.du !== undefined ? d.du : fallbackDu),
      v: computerEntity.v + (d.dv !== undefined ? d.dv : fallbackDv),
      y: d.dy !== undefined ? d.dy : fallbackDy,
    };
  }
  const PC_POS  = _devPos("pc",     0,     0,    1.1);
  const MON_POS = _devPos("mon",    0,     0,    1.6);
  const SPK_POS = _devPos("spk",    1.0,  -0.2,  0.8);
  const USB_POS = _devPos("usb",   -0.4,   0.1,  1.0);
  const RADIO_A = _devPos("radioA", 0.3,  -0.2,  1.4);

  // Place small visual proxies in the world (so you can SEE them)

    const m = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({ color: color, metalness: 0.4, roughness: 0.4 })
    );
    m.position.set(pos.u, pos.y, pos.v); m.castShadow = true;

      paint: (ctx, sc) => {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, sc.resolutionW, sc.resolutionH);
        // Tiny scanline shimmer
        for (let y = 0; y < sc.resolutionH; y += 2) {
          ctx.fillStyle = "rgba(50, 80, 120, 0.05)";
          ctx.fillRect(0, y, sc.resolutionW, 1);
        }
        ctx.fillStyle = "#88ddff";
        ctx.font = "bold 16px monospace";
        ctx.fillText("MON1  ◯ ON", 8, 22);
        ctx.font = "12px monospace";
        ctx.fillStyle = "#aaccff";
        const lines = String(sc.state.lastFrame || "").split("\n");
        let y = 50;
        for (const line of lines) {
          ctx.fillText(line, 8, y); y += 16;

  // ── F3 — Collaborative World Sync ─────────────────────────────────────────
  // Only active when gameMode === "peaceful" AND a multiplayer server is live.
  // Strategy: dirty-flag + 1 Hz flush so dragging an object doesn't spam 60 JSON
  // packets/s. Echo prevention: _applyingRemoteSync skips the flush during import.
  let _buildSyncDirty    = false;
  let _applyingRemoteSync = false;

  // Mark scene dirty after any local build mutation
  function _markBuildDirty() {
    if (gameMode === "peaceful") _buildSyncDirty = true;
  }

  // Flush: export full scene JSON and send to peers (1 Hz)
  setInterval(() => {
    if (!_buildSyncDirty || _applyingRemoteSync) return;
    if (gameMode !== "coop_build") return;
    if (typeof _mp === "undefined" || !_mp.enabled) return;
    _buildSyncDirty = false;
    const json = worldBuilder.exportSceneJSON();
    _mp.sendEvent("build", { action: "sync", json });
  }, 1000);

  // Apply an incoming peer build sync (called by LAN session via _mpState.onMpBuildEvent)
  _mpState.onMpBuildEvent = function(data) {
    if (data.action !== "sync" || !data.json) return;
    if (gameMode !== "coop_build" || !worldBuilder) return;
    _applyingRemoteSync = true;
    try {
      worldBuilder.importSceneJSON(data.json);
      if (typeof showToast === "function") showToast("Scene synced from peer", "info", 1000);
    } catch (e) {
      console.warn("[F3] Build sync import failed:", e);
    }
    _applyingRemoteSync = false;
  };

  // Broadcast current scene when WE connect or a new peer joins
  _mpState.onMpWelcomeHook = function() {
    if (gameMode !== "coop_build" || !worldBuilder) return;
    if (typeof _mp === "undefined" || !_mp.enabled) return;
    const json = worldBuilder.exportSceneJSON();
    _mp.sendEvent("build", { action: "sync", json });

  // flush interval won't echo it back.
  const _wbOrigSpawn  = worldBuilder.spawnPrimitive.bind(worldBuilder);
  const _wbOrigDel    = worldBuilder.deleteSelected.bind(worldBuilder);
  const _wbOrigClone  = worldBuilder.cloneSelected.bind(worldBuilder);
  const _wbOrigSetPos = worldBuilder.setPosition.bind(worldBuilder);
  const _wbOrigSetRot = worldBuilder.setRotation.bind(worldBuilder);
  const _wbOrigSetScl = worldBuilder.setScale.bind(worldBuilder);
  const _wbOrigSetCol = worldBuilder.setColor.bind(worldBuilder);

  worldBuilder.spawnPrimitive = (...a) => { const r = _wbOrigSpawn(...a);  _markBuildDirty(); return r; };
  worldBuilder.deleteSelected = (...a) => { const r = _wbOrigDel(...a);    _markBuildDirty(); return r; };
  worldBuilder.cloneSelected  = (...a) => { const r = _wbOrigClone(...a);  _markBuildDirty(); return r; };
  worldBuilder.setPosition    = (...a) => { const r = _wbOrigSetPos(...a); _markBuildDirty(); return r; };
  worldBuilder.setRotation    = (...a) => { const r = _wbOrigSetRot(...a); _markBuildDirty(); return r; };
  worldBuilder.setScale       = (...a) => { const r = _wbOrigSetScl(...a); _markBuildDirty(); return r; };
  worldBuilder.setColor       = (...a) => { const r = _wbOrigSetCol(...a); _markBuildDirty(); return r; };
  // ─────────────────────────────────────────────────────────────────────────
}, 250);

// Each frame: show/hide builder UI + update inspector inputs from the
// selected object (so external mutations like drag-move keep the panel
// in sync). Editing an input fires change → writes back to the mesh.
function _refreshBuilderUI() {
  const panel = document.getElementById("builderUI");
  if (!panel) return;
  panel.style.display = buildMode ? "block" : "none";
  // Hotbar + texture panel visibility
  const hb = document.getElementById("hotbar");
  if (hb) hb.classList.toggle("visible", buildMode);
  const tp = document.getElementById("texturePanel");
  if (tp) tp.classList.toggle("visible", buildMode);
  const inspector = document.getElementById("bInspector");
  if (!worldBuilder || !buildMode) { if (inspector) inspector.style.display = "none"; return; }
  // Live-update undo/redo depth counters
  const uc = document.getElementById("bUndoCount");
  const rc = document.getElementById("bRedoCount");
  if (uc) uc.textContent = worldBuilder.undoDepth();
  if (rc) rc.textContent = worldBuilder.redoDepth();
  const t = worldBuilder.getTransform();
  if (!t) { if (inspector) inspector.style.display = "none"; return; }
  inspector.style.display = "block";
  document.getElementById("bSelMeta").textContent =
    (t.meta.primitive ? t.meta.primitive : (t.meta.assetUrl || "mesh"));
  const set = (id, v, fixed) => {
    const el = document.getElementById(id);
    if (el && document.activeElement !== el) el.value = v.toFixed(fixed != null ? fixed : 2);
  };
  const DEG = 180 / Math.PI;
  set("bPosX", t.pos.x); set("bPosY", t.pos.y); set("bPosZ", t.pos.z);
  set("bRotX", t.rot.x * DEG, 0); set("bRotY", t.rot.y * DEG, 0); set("bRotZ", t.rot.z * DEG, 0);
  set("bSclX", t.scale.x); set("bSclY", t.scale.y); set("bSclZ", t.scale.z);

  // Color row — show if the selection has a material or light color
  const cinfo = worldBuilder.getColor();
  const colorRow = document.getElementById("bColorRow");
  if (cinfo) {
    colorRow.style.display = "block";
    const cel = document.getElementById("bColor");
    if (cel && document.activeElement !== cel) cel.value = cinfo.hex;
    document.getElementById("bColorKind").textContent = cinfo.kind;
  } else { colorRow.style.display = "none"; }

  // Intensity row — only for lights
  const ints = worldBuilder.getIntensity();
  const intRow = document.getElementById("bIntensityRow");
  if (ints != null) {
    intRow.style.display = "block";
    const iel = document.getElementById("bIntensity");
    if (iel && document.activeElement !== iel) iel.value = ints;
    document.getElementById("bIntensityVal").textContent = ints.toFixed(1);
  } else { intRow.style.display = "none"; }

  // Script editor — populate with the selected mesh's current script
  const sel = worldBuilder.getSelected();
  const scriptEl  = document.getElementById("bScript");
  const errEl     = document.getElementById("bScriptError");
  if (scriptEl && sel && document.activeElement !== scriptEl) {
    scriptEl.value = (t.meta.script) || "";
  }
  if (errEl && sel && window.ScriptRunner) {
    const err = window.ScriptRunner.getError(sel.uuid);
    errEl.textContent = err ? "ERR: " + err : "";
  }

  // Refresh scene hierarchy panel if open
  const shp = document.getElementById("sceneHierarchy");
  if (shp) {
    if (!buildMode) { shp.classList.remove("visible"); }
    else if (shp.classList.contains("visible")) _renderSceneHierarchy();
  }
}

    paint: (ctx, sc) => {

      ctx.fillStyle = "#000814";
      ctx.fillRect(0, 0, sc.resolutionW, sc.resolutionH);
      // huge scrolling marquee
      ctx.fillStyle = "#ffcc00";
      ctx.font = "bold 96px monospace";
      const msg = "▶ DWRLD ◀  ◆  WIRE THE WORLD TOGETHER  ◆  ";
      const x0 = -(t * 220) % (msg.length * 56);
      ctx.fillText(msg + msg, x0, sc.resolutionH * 0.45);
      ctx.fillStyle = "#88ddff";
      ctx.font = "bold 64px monospace";

  const BUILD_CONSOLE_W = 30, BUILD_CONSOLE_H = 12;  // metres
  const BUILD_CONSOLE_RW = 1024, BUILD_CONSOLE_RH = 400;
  const _SPAWN_BTNS = ["box","sphere","cylinder","plane","cone","torus","light"];

  function _makeBuildHitRegions() {
    const regions = [];

    _SCENE_BTNS.forEach((act, i) => {
      const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
      regions.push({ id: "act_" + act, label: act.toUpperCase(), x, y, w, h, onClick: acts[act] });

  }

  const buildConsoleScreen = SM.createScreen({
    id: "buildConsole",
    resolutionW: BUILD_CONSOLE_RW, resolutionH: BUILD_CONSOLE_RH,

        const x = 20 + i * 138, y = 20, w = 126, h = 70;
        const hover = sc.state.hoverBtn === "spawn_" + kind;
        ctx.fillStyle = hover ? "rgba(0,200,255,0.35)" : "rgba(0,200,255,0.1)";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = hover ? "#00ccff" : "rgba(0,200,255,0.4)";
        ctx.lineWidth = hover ? 2 : 1;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#b8e8ff";
        ctx.font = "bold 16px monospace";
        ctx.fillText(kind.toUpperCase(), x + 8, y + 34);
        const ico = { box:"▬", sphere:"●", cylinder:"⊙", plane:"▭", cone:"▲", torus:"◎", light:"☀" }[kind] || "+";
        ctx.font = "22px monospace";
        ctx.fillText(ico, x + 8, y + 62);
      });
      // Selection info — center strip
      const selX = 20, selY = 110;
      ctx.fillStyle = "#00ccff";
      ctx.font = "bold 13px monospace";
      ctx.fillText("SELECTION", selX, selY);
      ctx.fillStyle = "#66aacc";
      ctx.font = "12px monospace";
      try {
        const sel = worldBuilder && worldBuilder.getSelected();
        if (sel) {
          const p = sel.position, r = sel.rotation, s = sel.scale;
          ctx.fillStyle = "#aef060";
          ctx.fillText(sel.name || sel.uuid.slice(0, 8), selX, selY + 20);
          ctx.fillStyle = "#b8e8ff";
          ctx.fillText(`pos  (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`, selX, selY + 38);
          ctx.fillText(`rot  (${(r.x*57.3).toFixed(0)}°, ${(r.y*57.3).toFixed(0)}°, ${(r.z*57.3).toFixed(0)}°)`, selX, selY + 54);
          ctx.fillText(`scl  (${s.x.toFixed(2)}, ${s.y.toFixed(2)}, ${s.z.toFixed(2)})`, selX, selY + 70);
        } else {
          ctx.fillText("(nothing selected — spawn something above)", selX, selY + 30);
        }
      } catch (_) {}
      // Action buttons
      _SCENE_BTNS.forEach((act, i) => {
        const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
        const hover = sc.state.hoverBtn === "act_" + act;
        const danger = act === "delete";
        ctx.fillStyle = danger ? (hover ? "rgba(255,60,60,0.4)" : "rgba(255,60,60,0.12)") : (hover ? "rgba(0,200,255,0.3)" : "rgba(0,200,255,0.08)");
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = danger ? (hover ? "#ff4444" : "rgba(255,60,60,0.4)") : (hover ? "#00ccff" : "rgba(0,200,255,0.3)");
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = danger ? "#ff8888" : "#b8e8ff";
        ctx.font = "bold 15px monospace";
        ctx.fillText(act.toUpperCase(), x + 10, y + 38);
      });
      // Virtual cursor
      if (sc.state.cursorX >= 0) {

        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy); ctx.stroke();

  });

// aiming/aimAmt   — RMB zoom; aimAmt is a smoothed [0..1] lerp factor
// computerEntering/computerEntryT — cinematic dolly into desk screen
// snapZoomTarget  — Q/Z/V keybind zoom snap; lerped each tick until reached
// mouseMode       — M toggles: cursor drives an in-world screen, not the camera

function beginComputerEntry() {
  computerEntering = true;
  computerEntryT = 0;
  camDistBeforeEntry = camDist;
  // Release pointer lock so the user can interact with the overlay
  if (document.pointerLockElement) document.exitPointerLock();
}
function finishComputerEntry() {
  computerEntering = false;
  computerOpen = true;
  document.getElementById("computerOverlay").classList.add("open");
}
function closeComputer() {
  computerOpen = false;
  computerEntering = false;
  document.getElementById("computerOverlay").classList.remove("open");
  // Reset app pane back to home
  const aw = document.getElementById("appWindow");
  if (aw) aw.classList.remove("open");
  const ah = document.getElementById("appHome");
  if (ah) ah.style.display = "block";
  // Restore zoom level
  camDist = camDistBeforeEntry;
  // Re-acquire pointer lock so game controls resume immediately
  setTimeout(() => {
    if (!document.pointerLockElement && !buildMode) renderer.domElement.requestPointerLock();
  }, 50);
}

// Click to shoot (registered after renderer/scene/camYaw all exist).
// In mouse-mode we instead route LMB to the active screen's hit-test.
renderer.domElement.addEventListener("mousedown", (e) => {
  if (e.button !== 0) return;
  // BUILD MODE: check gizmo axis first, then LMB picks scene objects.
  if (buildMode && worldBuilder) {
    // Build console LMB — if crosshair is on the build console screen, fire the region
    if (pointerLocked && window._bcHoverRegion && window._buildConsoleScreen) {
      const sc = window._buildConsoleScreen;
      const region = (sc.hitRegions || []).find(r => r.id === window._bcHoverRegion);
      if (region && typeof region.onClick === "function") { region.onClick(sc); e.preventDefault(); return; }
    }
    const rect = renderer.domElement.getBoundingClientRect();
    const ndc = {
      x: ((e.clientX - rect.left) / rect.width)  * 2 - 1,
      y: -((e.clientY - rect.top)  / rect.height) * 2 + 1,
    };
    // Gizmo axis arrow clicked → start axis-locked drag
    const axis = worldBuilder.pickGizmoAxis(ndc);
    if (axis) {
      worldBuilder.startAxisDrag(axis, ndc);
      e.preventDefault();
      return;
    }
    // Regular pick: raycast against ALL scene objects (buildings, car, spawned meshes)
    const picked = worldBuilder.pickAt(ndc, { allScene: true });
    const wasSelected = worldBuilder.getSelected();
    if (e.shiftKey && picked) {
      // Shift-click: add to multi-select list for grouping
      if (window._builderMultiList) {
        if (!window._builderMultiList.includes(picked)) {
          window._builderMultiList.push(picked);
          playSfx("blip", 0.2);
        }
      }
      worldBuilder.select(picked);
    } else if (picked && picked === wasSelected) {
      worldBuilder.dragStart();
    } else {
      worldBuilder.select(picked);   // may be null (deselect)
      if (!e.shiftKey) window._builderMultiList && (window._builderMultiList.length = 0);
      playSfx("click", 0.3);
    }
    e.preventDefault();
    return;
  }
  if (mouseMode && activeMouseScreen && window.ScreenMesh) {
    // Convert screen-pixel cursor → UV (flip Y for THREE convention)
    const uv = {
      x: mouseModeCursor.x / activeMouseScreen.resolutionW,
      y: 1 - mouseModeCursor.y / activeMouseScreen.resolutionH,
    };
    const region = window.ScreenMesh.hitTest(activeMouseScreen, uv);
    if (region && typeof region.onClick === "function") region.onClick(activeMouseScreen);
    e.preventDefault();
    return;
  }
  if (!pointerLocked) return;
  if (invDiv.classList.contains("open")) return;
  if (computerOpen || computerEntering) return;
  if (inCar && activeVehicleId && (_activeVehicleDef || {}).type === "drone") { _tryDroneShoot(); return; }
  _tryShoot();
});

// ── Working-version system ──────────────────────────────────────────────────
// Shows "Did it load?" overlay 4s after loading screen dismisses.
// Yes → POST /api/git/verify (tags HEAD as 'working').
// Pull Working Btn → POST /api/git/pull-working then reload.
(function () {
  const GIT_API = "http://localhost:3001/api/git";
  const overlay = document.getElementById("loadCheckOverlay");
  const pullBtn = document.getElementById("pullWorkingBtn");

  function hideOverlay() { if (overlay) overlay.style.display = "none"; }

  function showLoadCheck() {
    if (!overlay) return;
    overlay.style.display = "block";
    document.getElementById("loadCheckYes").onclick = async function () {
      hideOverlay();
      try {
        const r = await fetch(GIT_API + "/verify", { method: "POST" });
        const d = await r.json();
        if (d.ok) showToast("Marked as working build ✓ (" + d.sha + ")", "success", 3000);
        else showToast("Could not tag: " + (d.error || "?"), "danger", 3000);
      } catch { showToast("Server not running — tag skipped", "danger", 2500); }
    };
    document.getElementById("loadCheckNo").onclick = hideOverlay;
  }

  async function pullWorkingVersion() {
    if (!confirm("Pull last verified working build? Page will reload.")) return;
    showToast("Fetching working build…", "info", 5000);
    try {
      const r = await fetch(GIT_API + "/pull-working", { method: "POST" });
      const d = await r.json();
      if (d.ok) { showToast("Switched to working build " + d.sha + " — reloading…", "success", 2000); setTimeout(() => location.reload(), 1800); }
      else showToast("Pull failed: " + (d.error || "?"), "danger", 4000);
    } catch { showToast("Server not running — cannot pull", "danger", 3000); }
  }

  if (pullBtn) {
    pullBtn.onclick = pullWorkingVersion;
    // Show pull button after git status check
    fetch(GIT_API + "/status").then(r => r.json()).then(d => {
      pullBtn.style.display = "block";
      if (d.workingSha) pullBtn.title = "Pull last working build: " + d.workingSha;
    }).catch(() => {});
  }

  // Watch for loading screen dismiss, then show load-check 4s later
  const _origDismiss = window._loadingDismissed;
  let _lcTimer = null;
  const _lcObs = setInterval(function () {
    if (window._loadingDismissed) {
      clearInterval(_lcObs);
      if (_lcTimer) return;
      _lcTimer = setTimeout(showLoadCheck, 4000);
    }
  }, 500);
}());
