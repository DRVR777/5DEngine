// Post-processing — loaded lazily; bloom optional if CDN unreachable
let composer = null;
Promise.all([
  import("three/addons/postprocessing/EffectComposer.js"),
  import("three/addons/postprocessing/RenderPass.js"),
  import("three/addons/postprocessing/UnrealBloomPass.js"),
]).then(([compMod, renderMod, bloomMod]) => {
  const { EffectComposer } = compMod;
  const { RenderPass }     = renderMod;
  const { UnrealBloomPass } = bloomMod;
  composer = new EffectComposer(renderer);
  // Match RT color space to renderer output so Three.js reuses the same
  // shader variants instead of recompiling for a different output encoding.
  // Mismatched color spaces cause refreshUniformsCommon to crash when the
  // new variant's uniform map is empty (uniforms.opacity === undefined).
  composer.renderTarget1.texture.colorSpace = THREE.SRGBColorSpace;
  composer.renderTarget2.texture.colorSpace = THREE.SRGBColorSpace;
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    0.55,   // strength
    0.40,   // radius
    0.82    // threshold — only bright surfaces bloom
  );
  composer.addPass(bloom);
  window._bloomPass = bloom;
  console.log("[5DEngine] bloom post-processing active");
}).catch((e) => {

// Buildings — built from WorldData schema; each gets a LayerBoundary for
// zone transitions and an AABB blocker for collision.
function _buildFromSchema(def, layerIdx) {
  return {
    id: def.id, color: def.color,
    b: new LayerBoundary(layerIdx, "rect", { u0: def.u0, v0: def.v0, u1: def.u1, v1: def.v1 }),
  };
}
const buildings = (WD.buildings || []).map((def, i) => _buildFromSchema(def, i + 2));

function rectToBlocker(building) {
  const { u0, v0, u1, v1 } = building.b.params;
  return { u: (u0+u1)/2, v: (v0+v1)/2, hitbox: { w: Math.abs(u1-u0), d: Math.abs(v1-v0), h: 6 }, y: 0 };
}
const buildingBlockers = buildings.map(rectToBlocker);

// Arena boundary walls — deferred until scene exists (called after scene is created)
function _buildArenaBoundary() {
  const HALF = 28, THICK = 1.6, HEIGHT = 2.2, matB = new THREE.MeshStandardMaterial({ color: 0x888880, roughness: 0.9, metalness: 0.1 });
  const wallDefs = [
    { u: 0,     v:  HALF, w: HALF * 2 + THICK, d: THICK },
    { u: 0,     v: -HALF, w: HALF * 2 + THICK, d: THICK },
    { u:  HALF, v: 0,     w: THICK, d: HALF * 2 + THICK },
    { u: -HALF, v: 0,     w: THICK, d: HALF * 2 + THICK },
  ];
  for (const wd of wallDefs) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(wd.w, HEIGHT, wd.d), matB);
    mesh.position.set(wd.u, HEIGHT / 2, wd.v);
    mesh.receiveShadow = mesh.castShadow = true;
    scene.add(mesh);
    buildingBlockers.push({ u: wd.u, v: wd.v, hitbox: { w: wd.w, d: wd.d, h: HEIGHT }, y: 0 });
  }
}

// Returns a (u,v) at radius [minR,maxR] from (cu,cv) that doesn't overlap any building.
// Retries up to maxTries times; falls back to a safe open-field spot if all fail.
function _spawnClearPos(minR, maxR, maxTries, cu, cv) {
  cu = cu || 0; cv = cv || 0;
  maxTries = maxTries || 30;
  const margin = 0.7; // enemy half-width + buffer so they don't clip wall edge
  for (let _t = 0; _t < maxTries; _t++) {
    const ang = Math.random() * Math.PI * 2;
    const r   = minR + Math.random() * (maxR - minR);
    const u   = cu + Math.cos(ang) * r;
    const v   = cv + Math.sin(ang) * r;
    let blocked = false;
    for (const bl of buildingBlockers) {
      if (Math.abs(bl.u) >= 26 || Math.abs(bl.v) >= 26) continue; // skip arena boundary walls
      const hw = bl.hitbox.w / 2 + margin;
      const hd = bl.hitbox.d / 2 + margin;

// Procedural ground texture — checker + noise so the player can see motion
function makeGroundTexture(size=256) {
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const g = c.getContext("2d");
  // base color
  g.fillStyle = "#4a7c59"; g.fillRect(0, 0, size, size);
  // big checker
  g.fillStyle = "#3f6b4d";
  for (let y = 0; y < size; y += 32)
    for (let x = (y / 32) % 2 === 0 ? 0 : 32; x < size; x += 64)
      g.fillRect(x, y, 32, 32);
  // grass speckle
  for (let i = 0; i < 1500; i++) {
    g.fillStyle = `rgba(${100 + Math.random()*80|0}, ${140 + Math.random()*60|0}, ${80 + Math.random()*40|0}, 0.5)`;
    g.fillRect(Math.random() * size | 0, Math.random() * size | 0, 1, 1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(20, 20);
  return tex;
}

function _explodeBarrel(u, v) {
  _spawnParticles(u, 0.5, v, 80, "orange", 18, 2.2);

  const nowMs = performance.now();
  for (const en of enemies) {
    if (en.dead) continue;
    const ep = world.players.get(en.id);
    if (!ep) continue;
    const d = Math.hypot(ep.u - u, ep.v - v);
    if (d < RADIUS) {
      en.hp = Math.max(0, en.hp - Math.round(MAX_DMG * (1 - d / RADIUS))); en._hpBarShowT = nowMs / 1000;
      if (en.hp <= 0 && !en.dead) {
        en.dead = true; en.respawnT = nowMs / 1000; enemyKills++;
        _comboCount++; _comboLastT = nowMs / 1000;
        _spawnDecal(ep.u, ep.v, en.type === "robot" ? "oil" : "blood");
        if (en.type === "incendiary") _spawnFirePatch(ep.u, ep.v);
        if (en.type === "poisoner") _spawnPoisonPuddle(ep.u, ep.v);
        _addKillFeedEntry(`★ BARREL KILL #${enemyKills} — ${en.type}`, "#ff6600");
        _trackKillAndPanic(ep.u, ep.v);
        { const _brlCoinMul = Math.min(8, _comboCount); _spawnCoinDrop(ep.u, ep.v, (_COIN_BY_TYPE[en.type]||1) * _brlCoinMul); }
        _spawnAmmoPickup(ep.u, ep.v, en.dropQty || 12, en.dropAmmo);
        if ((en.dropHealth || 0) > 0) _spawnHealthPickup(ep.u, ep.v, en.dropHealth);
        if (_WEAPON_DROP_MAP[en.type]) _spawnWeaponPickup(ep.u + 0.5, ep.v + 0.5, _WEAPON_DROP_MAP[en.type]);
      }
    }
  }
  const h = world.players.get("hero");
  const hd = Math.hypot(h.u - u, h.v - v);
  _applyScreenShake(Math.max(0, 0.8 * (1 - hd / (RADIUS * 1.5))));
  if (hd < RADIUS && !_heroDead && _dodgeT <= 0 && !(typeof Engine !== "undefined" && Engine.debug.godMode)) {
    const sd = Math.round(MAX_DMG * (1 - hd / RADIUS));
    if (sd > 0) { heroHp = Math.max(0, heroHp - sd); heroLastDamageT = nowMs / 1000; flashDamage(); if (heroHp <= 0 && !_heroDead) _heroShowDeathScreen(); }
    if (hd > 0.1) {
      const _hkbStr = 14 * (1 - hd / RADIUS);
      _heroKbU = ((h.u - u) / hd) * _hkbStr;
      _heroKbV = ((h.v - v) / hd) * _hkbStr;
      _heroKbT = 0.28;
    }
  }
  // Chain-explode adjacent barrels
  for (const bar of barrels) {
    if (!bar.exploded && Math.hypot(bar.u - u, bar.v - v) < RADIUS * 0.8) {
      bar.exploded = true; bar.mesh.visible = false;
      setTimeout(() => _explodeBarrel(bar.u, bar.v), 80);

    const bodyMat = new THREE.MeshStandardMaterial({ color: col, metalness: 0.7, roughness: 0.3 });
    const armMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.8 });
    const rotMat  = new THREE.MeshStandardMaterial({ color: 0x333355, transparent: true, opacity: 0.55 });
    // Central hex body
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.14, 6), bodyMat);
    body.position.y = 0.12; body.castShadow = true; group.add(body);
    // Camera bubble
    const cam = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x001133, emissive: 0x0033ff, emissiveIntensity: 0.4 }));
    cam.position.set(0, 0.06, 0.28); group.add(cam);
    // 4 diagonal arms + rotors
    group._rotors = [];
    const armCorners = [[0.38, 0.38], [-0.38, 0.38], [0.38, -0.38], [-0.38, -0.38]];
    const armRots    = [-Math.PI/4, Math.PI/4, -3*Math.PI/4, 3*Math.PI/4];
    for (let i = 0; i < 4; i++) {
      const [ax, az] = armCorners[i];
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.035, 0.76), armMat);
      arm.position.set(ax * 0.5, 0.12, az * 0.5);
      arm.rotation.y = armRots[i]; group.add(arm);
      // Landing leg
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.1, 0.03), armMat);
      leg.position.set(ax * 0.5, 0.04, az * 0.5); group.add(leg);
      // Rotor disc
      const rotor = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.014, 14), rotMat);
      rotor.position.set(ax, 0.13, az); group.add(rotor);
      group._rotors.push(rotor);
    }
    group._bodyMesh = body;
    return group;
  }

  // ---- Mech suit (bipedal walker) ----
  if (vDef.type === "mech") {
    const bodyMat = new THREE.MeshStandardMaterial({ color: col, metalness: 0.7, roughness: 0.35 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x223344, metalness: 0.8 });
    const accMat  = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xcc2200, emissiveIntensity: 0.8 });
    // Torso — main hull
    const torsoM = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.9, 0.7), bodyMat);
    torsoM.position.y = 1.55; torsoM.castShadow = true; group.add(torsoM);
    // Shoulder guards
    for (const sx of [-0.65, 0.65]) {
      const sh = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.35, 0.6), darkMat);
      sh.position.set(sx, 1.75, 0); group.add(sh);
    }
    // Head / cockpit dome
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.45, 0.55), bodyMat);
    head.position.y = 2.22; group.add(head);
    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.16, 0.1),
      new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 1.5 }));
    visor.position.set(0, 2.22, 0.33); group.add(visor);
    // Arms with cannons
    for (const ax of [-0.7, 0.7]) {
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.25), darkMat);
      arm.position.set(ax, 1.4, 0); group.add(arm);
      const cannon = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.55, 8), bodyMat);
      cannon.rotation.x = Math.PI / 2;
      cannon.position.set(ax, 1.4, 0.45); group.add(cannon);
      const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 0.12, 6), accMat);
      muzzle.rotation.x = Math.PI / 2;
      muzzle.position.set(ax, 1.4, 0.78); group.add(muzzle);
    }
    // Waist
    const waist = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.6), darkMat);
    waist.position.y = 1.05; group.add(waist);
    // Legs — stored in _legs for walk cycle
    group._legs = [];
    for (const lx of [-0.3, 0.3]) {
      const thighM = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.55, 0.32), bodyMat);
      thighM.position.set(lx, 0.72, 0); group.add(thighM);
      const shin = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.5, 0.28), darkMat);
      shin.position.set(lx, 0.27, 0); group.add(shin);
      const foot = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.12, 0.46), bodyMat);
      foot.position.set(lx, 0.06, 0.07); foot.castShadow = true; group.add(foot);
      group._legs.push({ thighM, shin });
    }
    group._bodyMesh = torsoM;
    return group;
  }

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.7, d),
    new THREE.MeshStandardMaterial({ color: col, metalness: 0.3, roughness: 0.4 })
  );
  body.position.y = 0.7; body.castShadow = true;
  group.add(body);
  // Roof (not for motorcycles)
  if (vDef.type !== "motorcycle") {
    const roofDark = new THREE.Color(col).multiplyScalar(0.6);
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(w * 0.85, 0.6, d * 0.5),
      new THREE.MeshStandardMaterial({ color: roofDark })
    );
    roof.position.set(0, 1.35, -d * 0.05); roof.castShadow = true;
    group.add(roof);
  }
  // Wheels — stored in group._wheels for spin animation
  const wheelW = w * 0.5, wheelD = d * 0.35;
  group._wheels = [];
  for (const wx of [-wheelW, wheelW]) for (const wz of [-wheelD, wheelD]) {
    const wh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    wh.rotation.z = Math.PI / 2;
    wh.position.set(wx, 0.35, wz); wh.castShadow = true;
    group.add(wh);
    group._wheels.push(wh);
  }
  group._bodyMesh = body;  // reference for AssetLoader replacement
  return group;
}

      foot.position.set(lx, 0.14, 0.05); group.add(foot);

    scene.add(group);

    );

// ---- device graph (devices.js + wires.js) ----------------------------
// Build a small in-world hardware setup adjacent to the computer pickup:
// PC ── video → Monitor (placed on top of the desk)
// PC ── audio → Speaker (placed to the right)
// PC ── data  ← USB stick (sitting in usb_a)
// Two radios: one at the desk, one across the map at the same frequency
// (so a packet sent from one literally appears in the other's inbox).
const deviceBus = (window.Devices && window.Devices.createBus)
  ? window.Devices.createBus()
  : null;
const wireMeshes = new Map();   // wireId → THREE.Mesh
const devicePositions = new Map();  // deviceId → THREE.Vector3 (for refresh)

function _rebuildDeviceWires() {
  if (!deviceBus || !window.Wires) return;
  // Tear down old meshes
  for (const m of wireMeshes.values()) scene.remove(m);
  wireMeshes.clear();
  const map = window.Wires.buildAllWireMeshes(THREE, deviceBus,
    (id) => {
      const v = devicePositions.get(id);
      return v ? { x: v.x, y: v.y, z: v.z } : null;
    });
  for (const [wireId, mesh] of map) {
    scene.add(mesh);
    wireMeshes.set(wireId, mesh);
  }
}

  deviceBus.insertMedia("pc1", "usb_a", "usb1");

  // Place small visual proxies in the world (so you can SEE them)
  function _proxy(color, w, h, d, pos) {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({ color: color, metalness: 0.4, roughness: 0.4 })
    );
    m.position.set(pos.u, pos.y, pos.v); m.castShadow = true;
    scene.add(m); return m;
  }
  // Speaker box (still a primitive)
  _proxy(0x553311, 0.3, 0.5, 0.3, SPK_POS);
  // mon1 — real screen_mesh that mirrors device-graph video_in inbox
  if (window.ScreenMesh) {
    const monScreen = window.ScreenMesh.createScreen({
      id: "mon1_phys",
      resolutionW: 384, resolutionH: 224,
      widthM: 0.7, heightM: 0.5,
      state: { lastFrame: "(no signal — boot the PC and click Devices)" },
      paint: (ctx, sc) => {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, sc.resolutionW, sc.resolutionH);
        // Tiny scanline shimmer
        for (let y = 0; y < sc.resolutionH; y += 2) {
          ctx.fillStyle = "rgba(50, 80, 120, 0.05)";
          ctx.fillRect(0, y, sc.resolutionW, 1);
        }
        ctx.fillStyle = "#88ddff";
        ctx.font = "bold 16px monospace";
        ctx.fillText("MON1  ◯ ON", 8, 22);
        ctx.font = "12px monospace";
        ctx.fillStyle = "#aaccff";
        const lines = String(sc.state.lastFrame || "").split("\n");
        let y = 50;
        for (const line of lines) {
          ctx.fillText(line, 8, y); y += 16;
          if (y > sc.resolutionH - 8) break;
        }
      },
    });
    const monMesh = window.ScreenMesh.bindToThree(THREE, monScreen, { doubleSided: true });
    if (monMesh) {
      monMesh.position.set(MON_POS.u, MON_POS.y, MON_POS.v + 0.1);
      monMesh.rotation.y = Math.PI; // face the player
      scene.add(monMesh);
      worldScreens.set(monScreen.id, { screen: monScreen, mesh: monMesh });
      // Tie this physical monitor to the device-graph mon1 — every tick we
      // drain its video_in inbox and paint the latest frame text.
      window.__mon1Bridge = {
        screen: monScreen,
        pollAndPaint: () => {
          if (!deviceBus) return;
          const frames = deviceBus.drain("mon1", "video_in");
          if (frames.length > 0) {
            const last = frames[frames.length - 1];
            const payload = last.payload || {};
            const txt = payload.frame || JSON.stringify(payload);
            monScreen.state.lastFrame = txt;
          }
        },
      };
    }
  } else {
    _proxy(0x222244, 0.7, 0.5, 0.05, MON_POS);
  }
  _proxy(0xcccccc, 0.08, 0.25, 0.05, USB_POS);   // USB
  _proxy(0x222233, 0.18, 0.25, 0.12, RADIO_A);   // walkie A
  _proxy(0x222233, 0.18, 0.25, 0.12, RADIO_B);   // walkie B

  devicePositions.set("pc1",    new THREE.Vector3(PC_POS.u,  PC_POS.y,  PC_POS.v));
  devicePositions.set("mon1",   new THREE.Vector3(MON_POS.u, MON_POS.y, MON_POS.v));
  devicePositions.set("spk1",   new THREE.Vector3(SPK_POS.u, SPK_POS.y, SPK_POS.v));
  devicePositions.set("usb1",   new THREE.Vector3(USB_POS.u, USB_POS.y, USB_POS.v));
  devicePositions.set("radioA", new THREE.Vector3(RADIO_A.u, RADIO_A.y, RADIO_A.v));
  devicePositions.set("radioB", new THREE.Vector3(RADIO_B.u, RADIO_B.y, RADIO_B.v));

  _rebuildDeviceWires();
}

function _spawnMedia(spec, pos) {
  const isCD = spec.kind === "cd";
  const geom = isCD
    ? new THREE.CylinderGeometry(0.18, 0.18, 0.02, 24)

  // ---- named scenes UI ----
  function _refreshSceneList() {

  // ---- Hotbar state ----

  window._builderMultiList = multiSelectList;

  function _hotbarSlotEl(i) { return document.querySelector('.hb-slot[data-slot="' + i + '"]'); }

  const PRIM_ICONS = { cube:"🟦", sphere:"🔵", cylinder:"🔶", plane:"🟩", light:"💡" };

  function _refreshHotbar() {

      } else {

  // Hotbar click (slot click = select that slot; double-click = spawn)
  document.getElementById("hotbar").addEventListener("click", (e) => {
    const sl = e.target.closest(".hb-slot");

      hotbarActive = i;
      _refreshHotbar();

  });

  // 1-9 keys select hotbar slots
  // (added to the keydown listener later; using the exposed refreshHotbar)
  window._hotbarSelectSlot = (i) => { hotbarActive = i; _refreshHotbar(); };
  window._hotbarSpawn = _spawnHotbarActive;

  // ---- Creative Inventory ----
  function _refreshCreativeInv() {
    const ciAssets = document.getElementById("ciAssets");
    if (!ciAssets) return;

    if (lib.length === 0) {
      ciAssets.innerHTML = '<span style="color:#555;font-size:10px">none yet — drag .glb/.obj/.fbx into the window</span>';

        </div>`

  // ---- Texture panel ----
  function _refreshTexPanel() {
    const sw = document.getElementById("texSwatches");
    if (!sw) return;
    const texs = worldBuilder.getTextures();
    if (texs.length === 0) {
      sw.innerHTML = '<span style="color:#555;font-size:9px">none — drop PNG/JPG below</span>';
    } else {
      sw.innerHTML = texs.map((t, i) =>

  }
  document.getElementById("texSwatches").addEventListener("click", (e) => {
    const sw = e.target.closest(".tex-swatch");
    if (!sw) return;

  // Texture drop zone
  const texDrop = document.getElementById("texDropZone");
  texDrop.addEventListener("click", () => {

  texDrop.addEventListener("drop", (e) => {

      if (!file.type.startsWith("image/")) continue;

      reader.onload = (ev) => {
        worldBuilder.addTexture(file.name, ev.target.result);

  // ---- G key: group selected + anything shift-clicked ----

      playSfx("tone:440:80:sine", 0.4);
    } else if (worldBuilder.getSelected()) {
      playSfx("noise", 0.2);
    }
  };

  _refreshHotbar();

  // ── F3 — Collaborative World Sync ─────────────────────────────────────────
  // Only active when gameMode === "peaceful" AND a multiplayer server is live.
  // Strategy: dirty-flag + 1 Hz flush so dragging an object doesn't spam 60 JSON
  // packets/s. Echo prevention: _applyingRemoteSync skips the flush during import.
  let _buildSyncDirty    = false;
  let _applyingRemoteSync = false;

  // Mark scene dirty after any local build mutation
  function _markBuildDirty() {
    if (gameMode === "peaceful") _buildSyncDirty = true;
  }

  // Flush: export full scene JSON and send to peers (1 Hz)
  setInterval(() => {
    if (!_buildSyncDirty || _applyingRemoteSync) return;
    if (gameMode !== "coop_build") return;
    if (typeof _mp === "undefined" || !_mp.enabled) return;
    _buildSyncDirty = false;
    const json = worldBuilder.exportSceneJSON();
    _mp.sendEvent("build", { action: "sync", json });
  }, 1000);

  // Apply an incoming peer build sync (called by LAN session via _mpState.onMpBuildEvent)
  _mpState.onMpBuildEvent = function(data) {
    if (data.action !== "sync" || !data.json) return;
    if (gameMode !== "coop_build" || !worldBuilder) return;
    _applyingRemoteSync = true;
    try {
      worldBuilder.importSceneJSON(data.json);
      if (typeof showToast === "function") showToast("Scene synced from peer", "info", 1000);
    } catch (e) {
      console.warn("[F3] Build sync import failed:", e);
    }
    _applyingRemoteSync = false;
  };

  // Broadcast current scene when WE connect or a new peer joins
  _mpState.onMpWelcomeHook = function() {
    if (gameMode !== "coop_build" || !worldBuilder) return;
    if (typeof _mp === "undefined" || !_mp.enabled) return;
    const json = worldBuilder.exportSceneJSON();
    _mp.sendEvent("build", { action: "sync", json });
  };

  // Wrap builder mutations to mark scene dirty — only wraps the outbound
  // path; importSceneJSON is called inside _applyingRemoteSync=true so the
  // flush interval won't echo it back.
  const _wbOrigSpawn  = worldBuilder.spawnPrimitive.bind(worldBuilder);
  const _wbOrigDel    = worldBuilder.deleteSelected.bind(worldBuilder);
  const _wbOrigClone  = worldBuilder.cloneSelected.bind(worldBuilder);
  const _wbOrigSetPos = worldBuilder.setPosition.bind(worldBuilder);
  const _wbOrigSetRot = worldBuilder.setRotation.bind(worldBuilder);
  const _wbOrigSetScl = worldBuilder.setScale.bind(worldBuilder);
  const _wbOrigSetCol = worldBuilder.setColor.bind(worldBuilder);

  worldBuilder.spawnPrimitive = (...a) => { const r = _wbOrigSpawn(...a);  _markBuildDirty(); return r; };
  worldBuilder.deleteSelected = (...a) => { const r = _wbOrigDel(...a);    _markBuildDirty(); return r; };
  worldBuilder.cloneSelected  = (...a) => { const r = _wbOrigClone(...a);  _markBuildDirty(); return r; };
  worldBuilder.setPosition    = (...a) => { const r = _wbOrigSetPos(...a); _markBuildDirty(); return r; };
  worldBuilder.setRotation    = (...a) => { const r = _wbOrigSetRot(...a); _markBuildDirty(); return r; };
  worldBuilder.setScale       = (...a) => { const r = _wbOrigSetScl(...a); _markBuildDirty(); return r; };
  worldBuilder.setColor       = (...a) => { const r = _wbOrigSetCol(...a); _markBuildDirty(); return r; };
  // ─────────────────────────────────────────────────────────────────────────
}, 250);

// Each frame: show/hide builder UI + update inspector inputs from the
// selected object (so external mutations like drag-move keep the panel
// in sync). Editing an input fires change → writes back to the mesh.
function _refreshBuilderUI() {
  const panel = document.getElementById("builderUI");
  if (!panel) return;
  panel.style.display = buildMode ? "block" : "none";
  // Hotbar + texture panel visibility

  if (!t) { if (inspector) inspector.style.display = "none"; return; }
  inspector.style.display = "block";
  document.getElementById("bSelMeta").textContent =
    (t.meta.primitive ? t.meta.primitive : (t.meta.assetUrl || "mesh"));
  const set = (id, v, fixed) => {
    const el = document.getElementById(id);
    if (el && document.activeElement !== el) el.value = v.toFixed(fixed != null ? fixed : 2);
  };
  const DEG = 180 / Math.PI;
  set("bPosX", t.pos.x); set("bPosY", t.pos.y); set("bPosZ", t.pos.z);
  set("bRotX", t.rot.x * DEG, 0); set("bRotY", t.rot.y * DEG, 0); set("bRotZ", t.rot.z * DEG, 0);
  set("bSclX", t.scale.x); set("bSclY", t.scale.y); set("bSclZ", t.scale.z);

  // Color row — show if the selection has a material or light color
  const cinfo = worldBuilder.getColor();
  const colorRow = document.getElementById("bColorRow");
  if (cinfo) {
    colorRow.style.display = "block";
    const cel = document.getElementById("bColor");
    if (cel && document.activeElement !== cel) cel.value = cinfo.hex;
    document.getElementById("bColorKind").textContent = cinfo.kind;
  } else { colorRow.style.display = "none"; }

  // Intensity row — only for lights
  const ints = worldBuilder.getIntensity();
  const intRow = document.getElementById("bIntensityRow");
  if (ints != null) {
    intRow.style.display = "block";
    const iel = document.getElementById("bIntensity");
    if (iel && document.activeElement !== iel) iel.value = ints;
    document.getElementById("bIntensityVal").textContent = ints.toFixed(1);
  } else { intRow.style.display = "none"; }

  // Script editor — populate with the selected mesh's current script
  const sel = worldBuilder.getSelected();
  const scriptEl  = document.getElementById("bScript");
  const errEl     = document.getElementById("bScriptError");
  if (scriptEl && sel && document.activeElement !== scriptEl) {
    scriptEl.value = (t.meta.script) || "";
  }
  if (errEl && sel && window.ScriptRunner) {
    const err = window.ScriptRunner.getError(sel.uuid);
    errEl.textContent = err ? "ERR: " + err : "";
  }

  // Refresh scene hierarchy panel if open
  const shp = document.getElementById("sceneHierarchy");
  if (shp) {
    if (!buildMode) { shp.classList.remove("visible"); }
    else if (shp.classList.contains("visible")) _renderSceneHierarchy();
  }
}

// ---- in-world screen interaction (E + raycast → hit-test) ----------
// Raycast from the camera through the screen center (crosshair) and
// invoke the region.onClick under the UV. Returns true if a screen
// was hit and a region was clicked (so the caller can preventDefault).
function tryClickWorldScreen() {
  if (!window.ScreenMesh) return false;
  if (!worldScreens || worldScreens.size === 0) return false;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const meshes = Array.from(worldScreens.values()).map(s => s.mesh);
  const screenMap = new Map();
  for (const [id, s] of worldScreens) screenMap.set(id, s.screen);
  const hit = window.ScreenMesh.pickScreen(raycaster, meshes, screenMap);
  if (!hit || !hit.screen) return false;
  // Range limit — must be within 50m
  if (hit.distance > 50) return false;
  // If we're hitting a BIG screen (jumbotron / sky / any >5m wide), enter
  // mouse-mode on it instead of treating E as a click. User sees a cursor
  // they can move with the mouse; LMB invokes the region's onClick.
  if (hit.screen.widthM >= 5 && !mouseMode) {
    enterScreenMouseMode(hit.screen, hit.uv);
    return true;
  }
  const region = window.ScreenMesh.hitTest(hit.screen, hit.uv);
  if (!region) return false;
  if (typeof region.onClick === "function") region.onClick(hit.screen);
  return true;
}

function enterScreenMouseMode(screen, uv) {
  activeMouseScreen = screen;
  mouseMode = true;
  // Seed cursor at the raycast UV (in canvas pixel coords)
  mouseModeCursor.x = (uv ? uv.x : 0.5) * screen.resolutionW;
  mouseModeCursor.y = (uv ? (1 - uv.y) : 0.5) * screen.resolutionH;
  if (document.pointerLockElement) document.exitPointerLock();
}
function exitScreenMouseMode() {
  activeMouseScreen = null;
  mouseMode = false;
}

    };
    _SCENE_BTNS.forEach((act, i) => {
      const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
      regions.push({ id: "act_" + act, label: act.toUpperCase(), x, y, w, h, onClick: acts[act] });

  const buildConsoleScreen = SM.createScreen({

          ctx.fillText(`rot  (${(r.x*57.3).toFixed(0)}°, ${(r.y*57.3).toFixed(0)}°, ${(r.z*57.3).toFixed(0)}°)`, selX, selY + 54);
          ctx.fillText(`scl  (${s.x.toFixed(2)}, ${s.y.toFixed(2)}, ${s.z.toFixed(2)})`, selX, selY + 70);
        } else {
          ctx.fillText("(nothing selected — spawn something above)", selX, selY + 30);

      } catch (_) {}
      // Action buttons
      _SCENE_BTNS.forEach((act, i) => {
        const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
        const hover = sc.state.hoverBtn === "act_" + act;

        ctx.lineWidth = 2;

        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.stroke();
      }
    },
  });
  const buildConsoleMesh = SM.bindToThree(THREE, buildConsoleScreen, { doubleSided: false });
  if (buildConsoleMesh) {
    buildConsoleMesh.position.set(0, BUILD_CONSOLE_H / 2 + 1, -88);

// Core runs alongside the monolith. No monolith code is removed or replaced.
// Prefabs are registered from data/ atoms. Tick integration comes in Tick 4+.
// Wrapped in try/catch — Core failing never breaks the existing game.
(async function _bootECS() {
  try {
    // Hero prefab: load atom, register the $facets.prefab sub-object
    const heroAtom = await Core.loadData("data/prefabs/hero.json");
    Core.registerPrefab("hero", heroAtom.$facets.prefab);

    // Enemy types: load index, then each stat atom → convert to component spec
    const enemyIndex = await Core.loadData("data/enemies/enemy_types.json");
    await Promise.all(enemyIndex.$facets.types.map(async (typeId) => {
      const atom = await Core.loadData(`data/enemies/types/${typeId}.json`);
      const f = atom.$facets;
      Core.registerPrefab(`enemy_${typeId}`, {
        components: {
          Transform: { u: 0, v: 0, y: 0, heading: 0 },
          Velocity:  { u: 0, v: 0, y: 0 },
          Health:    { hp: f.hp, maxHp: f.maxHp, armor: 0 },
          EnemyAI:   Object.assign(
            { type: atom.$id, state: "wander", alertT: -99, lastAttackT: -99,
              damage: f.damage, attackRange: f.attackRange,
              sightRange: f.sightRange, moveSpeed: f.moveSpeed,
              wanderSpeed: f.wanderSpeed },
            f.ability ? { ability: f.ability } : {}
          ),
          Faction:   { id: "enemy" },
          Mesh:      { type: "capsule", radius: f.bodyRadius, height: f.bodyHeight, color: f.color },
        }
      });
    }));

    // Load damage multipliers and wire combat system
    const dmAtom = await Core.loadData("data/enemies/damage_multipliers.json");

      _ecsCombatCtx.elapsedS += dt;
      combatSystem(dt, core, _ecsCombatCtx);

    const _ecsWave = createWaveSystem();

    Core.on("game:modeSelected", ({ mode }) => {
      if (mode === "solo" || mode === "wave_defense") _ecsWave.start(Core);

    Core.addSystem(_ecsKnockback, 16, "knockback");
    window.Engine.knockbackSystem = _ecsKnockback;

    // Wire stamina system — priority 18 (after weapon:8, ai:12, status:15, before regen:35)
    const _ecsStamina = createStaminaSystem();
    Core.addSystem(_ecsStamina, 18, "stamina");
    window.Engine.staminaSystem = _ecsStamina;

    // Wire player movement system — priority 7 (before weapon:8, combat:10)
    // Input bridge: caller should set Input component on hero entity before tick
    const _ecsPlayerMove = createPlayerMovementSystem();
    Core.addSystem(_ecsPlayerMove, 7, "player_movement");
    window.Engine.playerMovementSystem = _ecsPlayerMove;

    // Wire bullet system — priority 9 (after weapon:8, before combat:10)
    const _ecsBullet = createBulletSystem();
    Core.addSystem(_ecsBullet, 9, "bullet");
    window.Engine.bulletSystem = _ecsBullet;
    window.Engine.spawnBullet  = spawnBullet;

    // Wire loot drop system — priority 11 (after bullet:9/combat:10, before ai:12)
    // Detects enemy kills from bullet:hit and grenade:exploded; emits enemy:killed
    const _ecsLootDrop = createLootDropSystem(DROP_TABLE);
    Core.addSystem(_ecsLootDrop, 11, "loot_drop");
    window.Engine.lootDropSystem = _ecsLootDrop;

    // Wire grenade system — priority 22 (after stamina:18, before regen:35)
    const _ecsGrenade = createGrenadeSystem();
    Core.addSystem(_ecsGrenade, 22, "grenade");
    window.Engine.grenadeSystem = _ecsGrenade;

    // Wire regen system — priority 35 (after perk at 30)
    Core.addSystem(regenSystem, 35, "regen");

    // Wire status effect system — priority 15 (between combat at 10 and pickup at 20)
    const _ecsStatusFX = createStatusEffectSystem();
    Core.addSystem(_ecsStatusFX, 15, "status_effects");

    // Wire agent dispatch — priority 99 (runs last, after all game logic)
    // getSocket lazily grabs the _mp IIFE socket once it's available
    const _ecsAgentDispatch = createAgentDispatch({
      getSocket: () => (typeof io !== "undefined" ? io({ reconnectionAttempts: 3, timeout: 3000 }) : null),
    });
    Core.addSystem(_ecsAgentDispatch, 99, "agent_dispatch");

    window.Engine.waveSystem     = _ecsWave;
    window.Engine.spawnPickup    = spawnPickup;
    window.Engine.shopSystem     = _ecsShop;
    window.Engine.perkSystem     = _ecsPerk;
    window.Engine.agentDispatch  = _ecsAgentDispatch;

    console.info("[ECS] Core ready —", Core.snapshot());
  } catch (e) {
    console.warn("[ECS] Core boot failed (non-fatal):", e.message);
  }
})();
// ═══════════════════════════════════════════════════════════════════════════════
</script>
