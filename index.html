<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="data:,">
<title>5DEngine — Ankhor substrate</title>
<link rel="stylesheet" href="./src/ui/styles.css">
<style>
html,body{margin:0;height:100%;background:#0b0d12;overflow:hidden}
#stage{position:fixed;inset:0;display:block;touch-action:none}
</style>
</head>
<body>
<!-- EXACT game.html loading screen -->
<div id="loadingScreen">
  <div id="loadTitle">5DENGINE</div>
  <div id="loadSub">initializing systems…</div>
  <div id="loadBarWrap"><div id="loadBar"></div></div>
  <div id="loadHint">browser · three.js · wave combat</div>
</div>
<!-- Legacy globals — IIFE pattern, no ES exports -->
<script src="./src/core/engine.js"></script>
<script src="./src/core/event_bus.js"></script>
<script src="./src/world/day_night.js"></script>
<script src="./src/render/particle_system.js"></script>
<script src="./src/systems/registry.js"></script>
<script src="./src/systems/inventory.js"></script>
<canvas id="stage"></canvas>
<div id="boot" style="position:fixed;top:8px;left:8px;color:#0f0;font:11px monospace;z-index:10;pointer-events:none">ankhor</div>
<a href="./game.html" style="position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(20,24,40,0.85);border:1px solid #4a8;border-radius:6px;padding:5px 12px;color:#9fc;font:12px monospace;text-decoration:none;">⇆ legacy game</a>

<script type="importmap">
{ "imports": { "three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js", "registry":"./experimental/holograph-runtime/src/registry.js", "boot":"./src/ankhor/boot.js" } }
</script>
<script type="module">
import { boot } from "boot";

try {
  // Loading bar animation
  const loadBar = document.getElementById("loadBar");
  if (loadBar) loadBar.style.width = "30%";

  const ankhor = await boot({ canvas: document.getElementById("stage") });
  window.Ankhor = ankhor;
  document.getElementById("boot").textContent = "ankhor · live";

  // Input adapter — keyboard + mouse
  const keys = {}; let yaw=0,pitch=0,mouseHeld=false;
  addEventListener('keydown',e=>keys[e.code]=true);
  addEventListener('keyup',e=>keys[e.code]=false);
  const canvas=document.getElementById('stage');
  canvas.addEventListener('click',()=>canvas.requestPointerLock());
  addEventListener('mousemove',e=>{if(document.pointerLockElement===canvas){yaw-=e.movementX*0.0035;pitch=Math.max(-1.4,Math.min(0.4,pitch-e.movementY*0.0035))}});
  addEventListener('mousedown',e=>{if(e.button===0)mouseHeld=true});
  addEventListener('mouseup',e=>{if(e.button===0)mouseHeld=false});

  // Feed input-state → hero-shoot fires bullets
  const realTick = ankhor.tick.bind(ankhor);
  ankhor.tick = function(dt) {
    const inputs = ankhor.byKind("input");
    if (inputs.length) {
      const fd = ankhor.facetData(inputs[0].id, "input-state");
      if (fd) { fd.keys = {...keys}; fd.yaw = yaw; fd.pitch = pitch; fd.mouseHeld = mouseHeld; }
    }
    return realTick(dt);
  };

  // Hide loading screen
  const ls = document.getElementById("loadingScreen");
  if (ls) { ls.style.opacity = "0"; setTimeout(() => ls.remove(), 800); }
  if (loadBar) loadBar.style.width = "100%";
} catch(e) {
  document.getElementById("boot").textContent = "ankhor · " + (e?.message||"error");
}
</script>
</body>
</html>
