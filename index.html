  ════════════════════════════════════════════════════════════════════════════
  5DEngine — main module entry point
  ════════════════════════════════════════════════════════════════════════════

  ARCHITECTURE OVERVIEW
  ─────────────────────
  This file is the game's single entry point. All state lives here as `let`
  variables; systems receive it through closure-based dependency injection:

    mountXxx({ get: { foo: () => foo }, set: { foo: v => { foo = v; } }, actions })

  "get/set" pairs expose individual state fields without passing mutable refs.
  "actions" provides callbacks to engine functions the module needs to call.

  All extracted modules live in src/ and are re-exported from engine_modules.js.
  index.html imports only from that one barrel file.

  TICK FUNCTION ORDER (tick(), called via requestAnimationFrame)
  ──────────────────────────────────────────────────────────────
  1. Time: dt capped at 50ms; bullet-time scalar applied; Engine.time.tick
  2. HUD pre-tick: FPS counter, ammo/reload display, auto-fire
  3. Input: scope FOV, crosshair, sniper sway
  4. Camera: snap-zoom, computer entry dolly
  5. Computer-open early-exit: render + rAF, no gameplay
  6. Movement: freecam, hero WASD, vehicle physics, jump/gravity
  7. Footsteps, stamina, speed boost, motion springs
  8. Bullet physics: travel, enemy hit detection, kill processing
  9. Enemy AI loop: knockback, BT, vision, ranged attacks, movement
  10. NPC movement, enemy separation, enemy regen
  11. Pickups, hazards, grenade physics
  12. Optional systems: TriggerZones, SoundZones, Cutscene, Achievements,
      DayNight, StatusEffects, WaveManager
  13. Render: camera position, scene render, post-processing
  14. HUD post-tick: health bars, wave HUD, kill feed, overlay tints
  15. requestAnimationFrame(tick) — schedule next frame

  STATE VARIABLE CONVENTIONS
  ──────────────────────────
  _xxx     — private to this module (not exposed on window)
  _xxxTick — an extracted tick system (mountXxxTick return value)

  if (document.pointerLockElement) document.exitPointerLock();

function closeComputer() {
  computerOpen = false;
  computerEntering = false;
  document.getElementById("computerOverlay").classList.remove("open");

  const aw = document.getElementById("appWindow");
  if (aw) aw.classList.remove("open");
  const ah = document.getElementById("appHome");
  if (ah) ah.style.display = "block";
  // Restore zoom level
  camDist = camDistBeforeEntry;
  // Re-acquire pointer lock so game controls resume immediately
  setTimeout(() => {
    if (!document.pointerLockElement && !buildMode) renderer.domElement.requestPointerLock();
  }, 50);

// ── Working-version system ──────────────────────────────────────────────────
// Shows "Did it load?" overlay 4s after loading screen dismisses.
// Yes → POST /api/git/verify (tags HEAD as 'working').
// Pull Working Btn → POST /api/git/pull-working then reload.
(function () {
  const GIT_API = "http://localhost:3001/api/git";
  const overlay = document.getElementById("loadCheckOverlay");
  const pullBtn = document.getElementById("pullWorkingBtn");

  function hideOverlay() { if (overlay) overlay.style.display = "none"; }

  function showLoadCheck() {
    if (!overlay) return;
    overlay.style.display = "block";
    document.getElementById("loadCheckYes").onclick = async function () {
      hideOverlay();
      try {
        const r = await fetch(GIT_API + "/verify", { method: "POST" });
        const d = await r.json();
        if (d.ok) showToast("Marked as working build ✓ (" + d.sha + ")", "success", 3000);
        else showToast("Could not tag: " + (d.error || "?"), "danger", 3000);
      } catch { showToast("Server not running — tag skipped", "danger", 2500); }
    };
    document.getElementById("loadCheckNo").onclick = hideOverlay;
  }

  async function pullWorkingVersion() {
    if (!confirm("Pull last verified working build? Page will reload.")) return;
    showToast("Fetching working build…", "info", 5000);
    try {
      const r = await fetch(GIT_API + "/pull-working", { method: "POST" });
      const d = await r.json();
      if (d.ok) { showToast("Switched to working build " + d.sha + " — reloading…", "success", 2000); setTimeout(() => location.reload(), 1800); }
      else showToast("Pull failed: " + (d.error || "?"), "danger", 4000);
    } catch { showToast("Server not running — cannot pull", "danger", 3000); }
  }

  if (pullBtn) {
    pullBtn.onclick = pullWorkingVersion;
    // Show pull button after git status check
    fetch(GIT_API + "/status").then(r => r.json()).then(d => {
      pullBtn.style.display = "block";
      if (d.workingSha) pullBtn.title = "Pull last working build: " + d.workingSha;
    }).catch(() => {});
  }

  // Watch for loading screen dismiss, then show load-check 4s later
  const _origDismiss = window._loadingDismissed;
  let _lcTimer = null;
  const _lcObs = setInterval(function () {
    if (window._loadingDismissed) {
      clearInterval(_lcObs);
      if (_lcTimer) return;
      _lcTimer = setTimeout(showLoadCheck, 4000);
    }
  }, 500);
}());

// ── Runtime error reporter ───────────────────────────────────────────────────
// Catches all uncaught errors and unhandled promise rejections, POSTs them to
// /api/errors (server.js) so the Claude loop can read and fix them.
// Fire-and-forget — never blocks the game.
(function () {
  const ERROR_API = "http://localhost:3001/api/errors";
  let _waveHint = 0;
  // Track current wave so errors can be annotated with which wave they occurred on
  if (typeof window !== "undefined") {
    window._5DErrorWave = function (w) { _waveHint = w; };
  }
  function reportError(entry) {
    try {
      fetch(ERROR_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...entry, wave: _waveHint, timestamp: new Date().toISOString() }),
      }).catch(() => {});
    } catch {}
  }
  window.addEventListener("error", function (e) {
    reportError({ type: "uncaught", message: e.message, filename: e.filename, lineno: e.lineno, stack: e.error?.stack });
  });
  window.addEventListener("unhandledrejection", function (e) {
    reportError({ type: "unhandledrejection", message: String(e.reason?.message || e.reason || "") });
  });
}());
