// ---- device graph (devices.js + wires.js) ----------------------------
// Build a small in-world hardware setup adjacent to the computer pickup:
// PC ── video → Monitor (placed on top of the desk)
// PC ── audio → Speaker (placed to the right)
// PC ── data  ← USB stick (sitting in usb_a)
// Two radios: one at the desk, one across the map at the same frequency
// (so a packet sent from one literally appears in the other's inbox).
const deviceBus = (window.Devices && window.Devices.createBus)
  ? window.Devices.createBus()
  : null;
const wireMeshes = new Map();   // wireId → THREE.Mesh
const devicePositions = new Map();  // deviceId → THREE.Vector3 (for refresh)

function _rebuildDeviceWires() {
  if (!deviceBus || !window.Wires) return;
  // Tear down old meshes
  for (const m of wireMeshes.values()) scene.remove(m);
  wireMeshes.clear();
  const map = window.Wires.buildAllWireMeshes(THREE, deviceBus,
    (id) => {
      const v = devicePositions.get(id);
      return v ? { x: v.x, y: v.y, z: v.z } : null;
    });
  for (const [wireId, mesh] of map) {
    scene.add(mesh);
    wireMeshes.set(wireId, mesh);
  }
}

if (deviceBus) {
  // Device positions from WorldData.devices — du/dv/dy are relative to the computer entity
  const _devs = WD.devices || {};
  function _devPos(key, fallbackDu, fallbackDv, fallbackDy) {
    const d = _devs[key] || {};
    if (d.u !== undefined) return { u: d.u, v: d.v, y: d.dy !== undefined ? d.dy : fallbackDy };
    return {
      u: computerEntity.u + (d.du !== undefined ? d.du : fallbackDu),
      v: computerEntity.v + (d.dv !== undefined ? d.dv : fallbackDv),
      y: d.dy !== undefined ? d.dy : fallbackDy,
    };
  }
  const PC_POS  = _devPos("pc",     0,     0,    1.1);
  const MON_POS = _devPos("mon",    0,     0,    1.6);
  const SPK_POS = _devPos("spk",    1.0,  -0.2,  0.8);
  const USB_POS = _devPos("usb",   -0.4,   0.1,  1.0);
  const RADIO_A = _devPos("radioA", 0.3,  -0.2,  1.4);
  const RADIO_B = _devPos("radioB", 14.0,  4.0,  1.0);

  deviceBus.makeComputer({ id: "pc1", position: PC_POS,

    files: { "/notes.txt": "your personal stash" }, label: "MY_USB" });
  deviceBus.makeRadio({ id: "radioA", position: RADIO_A, frequency: 94.7,
    txRange: 80, rxRange: 80 });
  deviceBus.makeRadio({ id: "radioB", position: RADIO_B, frequency: 94.7,
    txRange: 80, rxRange: 80 });

  deviceBus.connect("pc1", "video_out", "mon1", "video_in", "video");
  deviceBus.connect("pc1", "audio_out", "spk1", "audio_in", "audio");
  deviceBus.insertMedia("pc1", "usb_a", "usb1");

  // Place small visual proxies in the world (so you can SEE them)
  function _proxy(color, w, h, d, pos) {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({ color: color, metalness: 0.4, roughness: 0.4 })
    );
    m.position.set(pos.u, pos.y, pos.v); m.castShadow = true;
    scene.add(m); return m;
  }
  // Speaker box (still a primitive)
  _proxy(0x553311, 0.3, 0.5, 0.3, SPK_POS);
  // mon1 — real screen_mesh that mirrors device-graph video_in inbox
  if (window.ScreenMesh) {
    const monScreen = window.ScreenMesh.createScreen({
      id: "mon1_phys",
      resolutionW: 384, resolutionH: 224,
      widthM: 0.7, heightM: 0.5,
      state: { lastFrame: "(no signal — boot the PC and click Devices)" },
      paint: (ctx, sc) => {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, sc.resolutionW, sc.resolutionH);
        // Tiny scanline shimmer
        for (let y = 0; y < sc.resolutionH; y += 2) {
          ctx.fillStyle = "rgba(50, 80, 120, 0.05)";
          ctx.fillRect(0, y, sc.resolutionW, 1);
        }
        ctx.fillStyle = "#88ddff";
        ctx.font = "bold 16px monospace";
        ctx.fillText("MON1  ◯ ON", 8, 22);
        ctx.font = "12px monospace";
        ctx.fillStyle = "#aaccff";
        const lines = String(sc.state.lastFrame || "").split("\n");
        let y = 50;
        for (const line of lines) {
          ctx.fillText(line, 8, y); y += 16;
          if (y > sc.resolutionH - 8) break;
        }
      },
    });
    const monMesh = window.ScreenMesh.bindToThree(THREE, monScreen, { doubleSided: true });
    if (monMesh) {
      monMesh.position.set(MON_POS.u, MON_POS.y, MON_POS.v + 0.1);
      monMesh.rotation.y = Math.PI; // face the player
      scene.add(monMesh);
      worldScreens.set(monScreen.id, { screen: monScreen, mesh: monMesh });
      // Tie this physical monitor to the device-graph mon1 — every tick we
      // drain its video_in inbox and paint the latest frame text.
      window.__mon1Bridge = {
        screen: monScreen,
        pollAndPaint: () => {
          if (!deviceBus) return;
          const frames = deviceBus.drain("mon1", "video_in");
          if (frames.length > 0) {
            const last = frames[frames.length - 1];
            const payload = last.payload || {};
            const txt = payload.frame || JSON.stringify(payload);
            monScreen.state.lastFrame = txt;
          }
        },
      };
    }
  } else {

  _proxy(0xcccccc, 0.08, 0.25, 0.05, USB_POS);   // USB
  _proxy(0x222233, 0.18, 0.25, 0.12, RADIO_A);   // walkie A

  devicePositions.set("pc1",    new THREE.Vector3(PC_POS.u,  PC_POS.y,  PC_POS.v));
  devicePositions.set("mon1",   new THREE.Vector3(MON_POS.u, MON_POS.y, MON_POS.v));
  devicePositions.set("spk1",   new THREE.Vector3(SPK_POS.u, SPK_POS.y, SPK_POS.v));
  devicePositions.set("usb1",   new THREE.Vector3(USB_POS.u, USB_POS.y, USB_POS.v));

    _applyingRemoteSync = true;
    try {
      worldBuilder.importSceneJSON(data.json);
      if (typeof showToast === "function") showToast("Scene synced from peer", "info", 1000);

      console.warn("[F3] Build sync import failed:", e);

    _applyingRemoteSync = false;

    const json = worldBuilder.exportSceneJSON();
    _mp.sendEvent("build", { action: "sync", json });
  };

  // path; importSceneJSON is called inside _applyingRemoteSync=true so the
  // flush interval won't echo it back.
  const _wbOrigSpawn  = worldBuilder.spawnPrimitive.bind(worldBuilder);
  const _wbOrigDel    = worldBuilder.deleteSelected.bind(worldBuilder);
  const _wbOrigClone  = worldBuilder.cloneSelected.bind(worldBuilder);
  const _wbOrigSetPos = worldBuilder.setPosition.bind(worldBuilder);
  const _wbOrigSetRot = worldBuilder.setRotation.bind(worldBuilder);
  const _wbOrigSetScl = worldBuilder.setScale.bind(worldBuilder);
  const _wbOrigSetCol = worldBuilder.setColor.bind(worldBuilder);

  worldBuilder.spawnPrimitive = (...a) => { const r = _wbOrigSpawn(...a);  _markBuildDirty(); return r; };
  worldBuilder.deleteSelected = (...a) => { const r = _wbOrigDel(...a);    _markBuildDirty(); return r; };
  worldBuilder.cloneSelected  = (...a) => { const r = _wbOrigClone(...a);  _markBuildDirty(); return r; };
  worldBuilder.setPosition    = (...a) => { const r = _wbOrigSetPos(...a); _markBuildDirty(); return r; };
  worldBuilder.setRotation    = (...a) => { const r = _wbOrigSetRot(...a); _markBuildDirty(); return r; };
  worldBuilder.setScale       = (...a) => { const r = _wbOrigSetScl(...a); _markBuildDirty(); return r; };
  worldBuilder.setColor       = (...a) => { const r = _wbOrigSetCol(...a); _markBuildDirty(); return r; };
  // ─────────────────────────────────────────────────────────────────────────
}, 250);

// ---- in-world screen interaction (E + raycast → hit-test) ----------
// Raycast from the camera through the screen center (crosshair) and
// invoke the region.onClick under the UV. Returns true if a screen
// was hit and a region was clicked (so the caller can preventDefault).
function tryClickWorldScreen() {
  if (!window.ScreenMesh) return false;
  if (!worldScreens || worldScreens.size === 0) return false;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const meshes = Array.from(worldScreens.values()).map(s => s.mesh);
  const screenMap = new Map();
  for (const [id, s] of worldScreens) screenMap.set(id, s.screen);
  const hit = window.ScreenMesh.pickScreen(raycaster, meshes, screenMap);
  if (!hit || !hit.screen) return false;
  // Range limit — must be within 50m
  if (hit.distance > 50) return false;
  // If we're hitting a BIG screen (jumbotron / sky / any >5m wide), enter
  // mouse-mode on it instead of treating E as a click. User sees a cursor
  // they can move with the mouse; LMB invokes the region's onClick.
  if (hit.screen.widthM >= 5 && !mouseMode) {
    enterScreenMouseMode(hit.screen, hit.uv);
    return true;
  }
  const region = window.ScreenMesh.hitTest(hit.screen, hit.uv);
  if (!region) return false;
  if (typeof region.onClick === "function") region.onClick(hit.screen);
  return true;
}

function enterScreenMouseMode(screen, uv) {
  activeMouseScreen = screen;
  mouseMode = true;
  // Seed cursor at the raycast UV (in canvas pixel coords)
  mouseModeCursor.x = (uv ? uv.x : 0.5) * screen.resolutionW;
  mouseModeCursor.y = (uv ? (1 - uv.y) : 0.5) * screen.resolutionH;
  if (document.pointerLockElement) document.exitPointerLock();
}
function exitScreenMouseMode() {
  activeMouseScreen = null;
  mouseMode = false;
}

  // In build mode the crosshair raycasts against this screen; LMB fires hit regions.
  // Pointer stays locked the entire time — no cursor mode needed.
  const BUILD_CONSOLE_W = 30, BUILD_CONSOLE_H = 12;  // metres
  const BUILD_CONSOLE_RW = 1024, BUILD_CONSOLE_RH = 400;
  const _SPAWN_BTNS = ["box","sphere","cylinder","plane","cone","torus","light"];
  const _SCENE_BTNS = ["undo","redo","clone","delete","save","load"];
  let _bcHover = null; // id of hovered hit region

  function _makeBuildHitRegions() {
    const regions = [];
    // Spawn row — top strip
    _SPAWN_BTNS.forEach((kind, i) => {
      const x = 20 + i * 138, y = 20, w = 126, h = 70;
      regions.push({ id: "spawn_" + kind, label: kind.toUpperCase(), x, y, w, h,
        onClick: () => {
          const hp = world.players.get("hero");
          const fwdX = Math.sin(freeCamYaw || 0) * 4, fwdZ = Math.cos(freeCamYaw || 0) * 4;
          if (worldBuilder) worldBuilder.spawnPrimitive(kind, { x: (hp && hp.u || 0) + fwdX, y: 1.0, z: (hp && hp.v || 0) + fwdZ });
          playSfx("blip", 0.3);
        },
      });
    });
    // Action row — bottom strip
    const acts = { undo: () => worldBuilder && worldBuilder.undo(), redo: () => worldBuilder && worldBuilder.redo(),
      clone: () => worldBuilder && worldBuilder.cloneSelected(), delete: () => worldBuilder && worldBuilder.deleteSelected(),
      save: () => { if (worldBuilder) { worldBuilder.saveState(); showToast("Scene saved", "success", 800); } },
      load: () => { if (worldBuilder) { const s = worldBuilder.loadState(); if (s) worldBuilder.rehydrate(s); showToast("Scene loaded", "info", 800); } },
    };
    _SCENE_BTNS.forEach((act, i) => {
      const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
      regions.push({ id: "act_" + act, label: act.toUpperCase(), x, y, w, h, onClick: acts[act] });
    });
    return regions;
  }

  const buildConsoleScreen = SM.createScreen({
    id: "buildConsole",
    resolutionW: BUILD_CONSOLE_RW, resolutionH: BUILD_CONSOLE_RH,
    widthM: BUILD_CONSOLE_W, heightM: BUILD_CONSOLE_H,
    state: { cursorX: -1, cursorY: -1, hoverBtn: null },
    hitRegions: _makeBuildHitRegions(),
    paint: (ctx, sc) => {
      ctx.fillStyle = "#030c1e";
      ctx.fillRect(0, 0, BUILD_CONSOLE_RW, BUILD_CONSOLE_RH);
      // Title
      ctx.fillStyle = "#00ccff";
      ctx.font = "bold 18px monospace";
      ctx.fillText("⬡ 5DENGINE BUILD CONSOLE  [LMB=click · WASD=fly · R=lock toggle]", 14, 14);
      // Spawn buttons
      _SPAWN_BTNS.forEach((kind, i) => {
        const x = 20 + i * 138, y = 20, w = 126, h = 70;
        const hover = sc.state.hoverBtn === "spawn_" + kind;
        ctx.fillStyle = hover ? "rgba(0,200,255,0.35)" : "rgba(0,200,255,0.1)";
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = hover ? "#00ccff" : "rgba(0,200,255,0.4)";
        ctx.lineWidth = hover ? 2 : 1;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "#b8e8ff";
        ctx.font = "bold 16px monospace";
        ctx.fillText(kind.toUpperCase(), x + 8, y + 34);
        const ico = { box:"▬", sphere:"●", cylinder:"⊙", plane:"▭", cone:"▲", torus:"◎", light:"☀" }[kind] || "+";
        ctx.font = "22px monospace";
        ctx.fillText(ico, x + 8, y + 62);
      });
      // Selection info — center strip
      const selX = 20, selY = 110;
      ctx.fillStyle = "#00ccff";
      ctx.font = "bold 13px monospace";
      ctx.fillText("SELECTION", selX, selY);
      ctx.fillStyle = "#66aacc";
      ctx.font = "12px monospace";
      try {
        const sel = worldBuilder && worldBuilder.getSelected();
        if (sel) {
          const p = sel.position, r = sel.rotation, s = sel.scale;
          ctx.fillStyle = "#aef060";
          ctx.fillText(sel.name || sel.uuid.slice(0, 8), selX, selY + 20);
          ctx.fillStyle = "#b8e8ff";
          ctx.fillText(`pos  (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)})`, selX, selY + 38);
          ctx.fillText(`rot  (${(r.x*57.3).toFixed(0)}°, ${(r.y*57.3).toFixed(0)}°, ${(r.z*57.3).toFixed(0)}°)`, selX, selY + 54);
          ctx.fillText(`scl  (${s.x.toFixed(2)}, ${s.y.toFixed(2)}, ${s.z.toFixed(2)})`, selX, selY + 70);
        } else {
          ctx.fillText("(nothing selected — spawn something above)", selX, selY + 30);
        }
      } catch (_) {}
      // Action buttons
      _SCENE_BTNS.forEach((act, i) => {
        const x = 20 + i * 165, y = BUILD_CONSOLE_RH - 90, w = 153, h = 68;
        const hover = sc.state.hoverBtn === "act_" + act;
        const danger = act === "delete";
        ctx.fillStyle = danger ? (hover ? "rgba(255,60,60,0.4)" : "rgba(255,60,60,0.12)") : (hover ? "rgba(0,200,255,0.3)" : "rgba(0,200,255,0.08)");
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = danger ? (hover ? "#ff4444" : "rgba(255,60,60,0.4)") : (hover ? "#00ccff" : "rgba(0,200,255,0.3)");
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = danger ? "#ff8888" : "#b8e8ff";
        ctx.font = "bold 15px monospace";
        ctx.fillText(act.toUpperCase(), x + 10, y + 38);
      });
      // Virtual cursor
      if (sc.state.cursorX >= 0) {
        const cx = sc.state.cursorX, cy = sc.state.cursorY;
        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.stroke();
      }
    },
  });
  const buildConsoleMesh = SM.bindToThree(THREE, buildConsoleScreen, { doubleSided: false });
  if (buildConsoleMesh) {
    buildConsoleMesh.position.set(0, BUILD_CONSOLE_H / 2 + 1, -88);
    buildConsoleMesh.rotation.y = 0; // faces +z (toward hero spawn)
    scene.add(buildConsoleMesh);
    worldScreens.set(buildConsoleScreen.id, { screen: buildConsoleScreen, mesh: buildConsoleMesh });
  }
  window._buildConsoleScreen = buildConsoleScreen;
  window._buildConsoleMesh = buildConsoleMesh;
}

// Click to shoot (registered after renderer/scene/camYaw all exist).
// In mouse-mode we instead route LMB to the active screen's hit-test.
renderer.domElement.addEventListener("mousedown", (e) => {
  if (e.button !== 0) return;
  // BUILD MODE: check gizmo axis first, then LMB picks scene objects.
  if (buildMode && worldBuilder) {
    // Build console LMB — if crosshair is on the build console screen, fire the region
    if (pointerLocked && window._bcHoverRegion && window._buildConsoleScreen) {
      const sc = window._buildConsoleScreen;
      const region = (sc.hitRegions || []).find(r => r.id === window._bcHoverRegion);
      if (region && typeof region.onClick === "function") { region.onClick(sc); e.preventDefault(); return; }
    }
    const rect = renderer.domElement.getBoundingClientRect();
    const ndc = {
      x: ((e.clientX - rect.left) / rect.width)  * 2 - 1,
      y: -((e.clientY - rect.top)  / rect.height) * 2 + 1,
    };
    // Gizmo axis arrow clicked → start axis-locked drag
    const axis = worldBuilder.pickGizmoAxis(ndc);
    if (axis) {
      worldBuilder.startAxisDrag(axis, ndc);
      e.preventDefault();
      return;
    }
    // Regular pick: raycast against ALL scene objects (buildings, car, spawned meshes)
    const picked = worldBuilder.pickAt(ndc, { allScene: true });
    const wasSelected = worldBuilder.getSelected();
    if (e.shiftKey && picked) {
      // Shift-click: add to multi-select list for grouping
      if (window._builderMultiList) {
        if (!window._builderMultiList.includes(picked)) {
          window._builderMultiList.push(picked);
          playSfx("blip", 0.2);
        }
      }
      worldBuilder.select(picked);
    } else if (picked && picked === wasSelected) {
      worldBuilder.dragStart();
    } else {
      worldBuilder.select(picked);   // may be null (deselect)
      if (!e.shiftKey) window._builderMultiList && (window._builderMultiList.length = 0);
      playSfx("click", 0.3);
    }
    e.preventDefault();

      questProgress: _quest.getQuests().map(q => ({ id: q.id, steps: q.steps.map(s => s.done) })),
    };
  },
  (data, source) => {
    if (data.score) score = data.score;
    if (data.enemy_kills != null) enemyKills = data.enemy_kills;
    else if (data.enemyKills) enemyKills = data.enemyKills;
    if (data.hero_hp != null) heroHp = Math.min(data.hero_hp, HERO_MAX_HP);
    else if (data.heroHp) heroHp = Math.min(data.heroHp, HERO_MAX_HP);
    const spawnPts = data.spawn_points || data.spawnPoints;
    if (Array.isArray(spawnPts)) { for (const sp of spawnPts) _addSpawnPoint(sp.u, sp.v); }
    const qp = data.quest_progress || data.questProgress;
    if (Array.isArray(qp)) {
      for (const entry of qp) {
        const q = _quest.getQuests().find(q => q.id === (entry.id || entry.quest_id));
        if (!q) continue;
        const steps = entry.steps || entry.steps_done;
        if (Array.isArray(steps)) {
          for (let i = 0; i < steps.length && i < q.steps.length; i++) { if (steps[i]) q.steps[i].done = true; }
        }
      }
      _quest.renderQuests();
    }
    const age = data.saved_at
      ? Math.round((Date.now() - new Date(data.saved_at).getTime()) / 60000)
      : (data.timestamp ? Math.round((Date.now() - data.timestamp) / 60000) : 0);
    showToast(`Save loaded from ${source} (${age}m ago) — score:${score} kills:${enemyKills}`, "info", 4000);
  },
  { getQuests: () => _quest.getQuests() }
);
